version: "3"

services:
  postgres_db:
    image: postgres:15
    container_name: nextjs-postgres-db
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydb
    ports:
      - 5432:5432
    volumes:
      - nextjs_postgres_data:/var/lib/postgresql/data

volumes:
  nextjs_postgres_data:
